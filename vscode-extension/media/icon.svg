<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#04080f"/>
    </radialGradient>

    <!-- Convergence glow at center -->
    <radialGradient id="nexus" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="80%"  stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Stream gradients — each fades from colour to transparent at tip -->
    <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="s2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="s3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="s4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.8"/>
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strong-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <!-- ── 8 converging angular streams ───────────────────────────────────── -->
    <!-- Each stream is a thin triangle/wedge pointing at (50,50) -->

    <!-- Top-left  → cyan -->
    <polygon points="4,4 28,10 10,28"    fill="url(#s1)" opacity="0.85"/>
    <!-- Bottom-left → emerald -->
    <polygon points="4,96 28,90 10,72"   fill="url(#s3)" opacity="0.75"/>
    <!-- Top-right  → violet -->
    <polygon points="96,4 72,10 90,28"   fill="url(#s2)" opacity="0.85"/>
    <!-- Bottom-right → purple -->
    <polygon points="96,96 72,90 90,72"  fill="url(#s4)" opacity="0.8"/>

    <!-- Mid-left  → cyan thin -->
    <polygon points="4,42 20,46 20,54 4,58" fill="url(#s1)" opacity="0.5"/>
    <!-- Mid-right → violet thin -->
    <polygon points="96,42 80,46 80,54 96,58" fill="url(#s2)" opacity="0.5"/>
    <!-- Mid-top   → teal thin -->
    <polygon points="42,4 46,20 54,20 58,4" fill="url(#s3)" opacity="0.45"/>
    <!-- Mid-bottom → purple thin -->
    <polygon points="42,96 46,80 54,80 58,96" fill="url(#s4)" opacity="0.45"/>

    <!-- ── Glow bloom behind nexus ────────────────────────────────────────── -->
    <circle cx="50" cy="50" r="22" fill="#3b82f6" opacity="0.12" filter="url(#strong-glow)"/>
    <circle cx="50" cy="50" r="14" fill="#60a5fa" opacity="0.18" filter="url(#strong-glow)"/>

    <!-- ── Central nexus — glowing core ──────────────────────────────────── -->
    <circle cx="50" cy="50" r="16" fill="url(#nexus)" filter="url(#blur-glow)"/>

    <!-- ── Inner geometric mark — angular hexagon ────────────────────────── -->
    <path d="M50 37 L60 43 L60 57 L50 63 L40 57 L40 43 Z"
      fill="none" stroke="#bfdbfe" stroke-width="1.5" opacity="0.9"/>

    <!-- ── Lightning bolt at absolute centre ─────────────────────────────── -->
    <path d="M52 40 L46 51 L50 51 L48 60 L54 49 L50 49 Z"
      fill="#ffffff" opacity="0.95"/>

    <!-- ── Tiny node dots where streams end ──────────────────────────────── -->
    <circle cx="16" cy="16" r="1.8" fill="#06b6d4" opacity="0.9"/>
    <circle cx="84" cy="16" r="1.8" fill="#818cf8" opacity="0.9"/>
    <circle cx="16" cy="84" r="1.8" fill="#34d399" opacity="0.8"/>
    <circle cx="84" cy="84" r="1.8" fill="#a78bfa" opacity="0.8"/>
    <circle cx="10" cy="50" r="1.4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="90" cy="50" r="1.4" fill="#818cf8" opacity="0.7"/>
    <circle cx="50" cy="10" r="1.4" fill="#34d399" opacity="0.6"/>
    <circle cx="50" cy="90" r="1.4" fill="#a78bfa" opacity="0.6"/>
  </g>
</svg>