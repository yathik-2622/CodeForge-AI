<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle grid lines (very faint) -->
  <line x1="0" y1="33" x2="100" y2="33" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="67" x2="100" y2="67" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  <line x1="33" y1="0" x2="33" y2="100" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
  <line x1="67" y1="0" x2="67" y2="100" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>

  <!-- Outer border glow -->
  <rect width="100" height="100" rx="22" stroke="url(#blue)" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Circuit corner — top-left -->
  <polyline points="8,20 8,8 20,8" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <circle cx="8" cy="8" r="1.8" fill="#38bdf8" opacity="0.9"/>

  <!-- Circuit corner — top-right -->
  <polyline points="92,20 92,8 80,8" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <circle cx="92" cy="8" r="1.8" fill="#38bdf8" opacity="0.9"/>

  <!-- Circuit corner — bottom-left -->
  <polyline points="8,80 8,92 20,92" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <circle cx="8" cy="92" r="1.8" fill="#818cf8" opacity="0.9"/>

  <!-- Circuit corner — bottom-right -->
  <polyline points="92,80 92,92 80,92" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <circle cx="92" cy="92" r="1.8" fill="#818cf8" opacity="0.9"/>

  <!-- Left bracket < -->
  <polyline points="30,32 18,50 30,68"
    stroke="url(#blue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Right bracket > -->
  <polyline points="70,32 82,50 70,68"
    stroke="url(#purple)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Lightning bolt (centre) — CodeForge "power" symbol -->
  <path d="M 56 24 L 42 52 L 51 52 L 44 76 L 58 48 L 49 48 Z"
    fill="url(#bolt)" filter="url(#softglow)"/>

  <!-- Tiny node dots on bracket tips -->
  <circle cx="30" cy="32" r="2" fill="#38bdf8" opacity="0.8"/>
  <circle cx="30" cy="68" r="2" fill="#38bdf8" opacity="0.8"/>
  <circle cx="70" cy="32" r="2" fill="#818cf8" opacity="0.8"/>
  <circle cx="70" cy="68" r="2" fill="#818cf8" opacity="0.8"/>

  <!-- Scan line (horizontal, subtle) -->
  <line x1="12" y1="50" x2="18" y2="50" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <line x1="82" y1="50" x2="88" y2="50" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
</svg>