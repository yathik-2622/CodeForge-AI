<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- 6 petals – OpenAI-inspired starburst, each is a rounded bar rotating 60° -->
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate(  0 50 50)" opacity="0.95"/>
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate( 60 50 50)" opacity="0.90"/>
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate(120 50 50)" opacity="0.85"/>
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate(180 50 50)" opacity="0.95"/>
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate(240 50 50)" opacity="0.90"/>
  <rect x="44" y="5"  width="12" height="30" rx="6" fill="url(#gA)" transform="rotate(300 50 50)" opacity="0.85"/>

  <!-- White punch-out to create ring effect -->
  <circle cx="50" cy="50" r="17" fill="white"/>

  <!-- Lightning bolt in centre -->
  <path d="M54 33 L41 51 H51 L45 67 L59 49 H49 Z" fill="url(#gB)"/>
</svg>
